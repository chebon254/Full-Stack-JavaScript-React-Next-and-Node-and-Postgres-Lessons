  <script>
    const LESSONS = [
      {
            "id": 1,
            "title": "What is Flutter? — LEGO for Apps 🧩",
            "difficulty": "Beginner",
            "analogy": "Flutter builds one app from one set of LEGO bricks (widgets) that renders identically on Android, iOS, and the web.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "main() + runApp() — the entry point",
                        "code": "import 'package:flutter/material.dart';\n\nvoid main() {\n  runApp(const MyApp());\n}"
                  },
                  {
                        "label": "A minimal MaterialApp",
                        "code": "class MyApp extends StatelessWidget {\n  const MyApp({super.key});\n\n  @override\n  Widget build(BuildContext context) {\n    return MaterialApp(\n      home: Scaffold(\n        appBar: AppBar(title: const Text('My App')),\n        body: const Center(child: Text('Hello, Flutter!')),\n      ),\n    );\n  }\n}"
                  },
                  {
                        "label": "Creating a new Flutter project",
                        "runnable": false,
                        "code": "flutter create my_app\ncd my_app\nflutter run"
                  }
            ]
      },
      {
            "id": 2,
            "title": "Dart Basics — The Language Under the Hood ⚙️",
            "difficulty": "Beginner",
            "analogy": "Dart is the language; Flutter is the toolkit built on top of it. You write Dart, Flutter turns it into pixels.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "Variables and types",
                        "code": "String name = 'Alice';\nint age = 25;\ndouble price = 19.99;\nbool isActive = true;\n\nprint('$name is $age years old');"
                  },
                  {
                        "label": "var, final, and const",
                        "code": "var city = 'Nairobi';    // type inferred, can reassign\nfinal country = 'Kenya'; // set once at runtime\nconst pi = 3.14159;      // fixed at compile time"
                  },
                  {
                        "label": "Null safety — nullable types",
                        "code": "String? middleName;   // can be null\nmiddleName ??= 'none'; // assign only if null\nprint(middleName);"
                  }
            ]
      },
      {
            "id": 3,
            "title": "Widgets — Stateless vs Stateful 🏗️",
            "difficulty": "Beginner",
            "analogy": "A StatelessWidget is a printed photo — it never changes once created. A StatefulWidget is a whiteboard — it can be redrawn.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "StatelessWidget — never changes after building",
                        "code": "class Greeting extends StatelessWidget {\n  final String name;\n  const Greeting({super.key, required this.name});\n\n  @override\n  Widget build(BuildContext context) {\n    return Text('Hello, $name!');\n  }\n}"
                  },
                  {
                        "label": "StatefulWidget — can change over time",
                        "code": "class Counter extends StatefulWidget {\n  const Counter({super.key});\n\n  @override\n  State<Counter> createState() => _CounterState();\n}\n\nclass _CounterState extends State<Counter> {\n  int count = 0;\n\n  void increment() {\n    setState(() {\n      count++;\n    });\n  }\n\n  @override\n  Widget build(BuildContext context) {\n    return Column(\n      children: [\n        Text('Count: $count'),\n        ElevatedButton(onPressed: increment, child: const Text('+1')),\n      ],\n    );\n  }\n}"
                  }
            ]
      },
      {
            "id": 4,
            "title": "Basic Widgets — The Building Blocks 🧱",
            "difficulty": "Beginner",
            "analogy": "Text, Container, Row, and Column are the plain bricks every Flutter screen is built from.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "Text and Container",
                        "code": "Container(\n  padding: const EdgeInsets.all(16),\n  color: Colors.blue,\n  child: const Text('Styled text', style: TextStyle(color: Colors.white)),\n)"
                  },
                  {
                        "label": "Row and Column — laying widgets out",
                        "code": "Column(\n  children: [\n    const Text('Top'),\n    Row(\n      children: const [\n        Icon(Icons.star),\n        Text('Rating: 5'),\n      ],\n    ),\n  ],\n)"
                  },
                  {
                        "label": "Image widget",
                        "code": "Image.network('https://picsum.photos/200')"
                  }
            ]
      },
      {
            "id": 5,
            "title": "Layouts — Arranging the Room 🛋️",
            "difficulty": "Beginner",
            "analogy": "Padding is the empty space around furniture. Expanded and Stack decide how pieces share or overlap the room.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "Padding and Center",
                        "code": "Center(\n  child: Padding(\n    padding: const EdgeInsets.all(24),\n    child: const Text('Centered with padding'),\n  ),\n)"
                  },
                  {
                        "label": "Expanded — fill remaining space",
                        "code": "Row(\n  children: [\n    Expanded(child: Container(color: Colors.red, height: 50)),\n    Expanded(child: Container(color: Colors.blue, height: 50)),\n  ],\n)"
                  },
                  {
                        "label": "Stack — overlap widgets",
                        "code": "Stack(\n  children: [\n    Image.network('https://picsum.photos/300'),\n    const Positioned(\n      bottom: 8,\n      right: 8,\n      child: Text('Caption', style: TextStyle(color: Colors.white)),\n    ),\n  ],\n)"
                  }
            ]
      },
      {
            "id": 6,
            "title": "State Management with setState — The Redraw Signal 🔄",
            "difficulty": "Intermediate",
            "analogy": "Changing a variable is like erasing pencil marks nobody can see. setState() is telling the teacher to hold up the new whiteboard.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "Updating state with setState",
                        "code": "class LikeButton extends StatefulWidget {\n  const LikeButton({super.key});\n\n  @override\n  State<LikeButton> createState() => _LikeButtonState();\n}\n\nclass _LikeButtonState extends State<LikeButton> {\n  bool liked = false;\n\n  @override\n  Widget build(BuildContext context) {\n    return IconButton(\n      icon: Icon(liked ? Icons.favorite : Icons.favorite_border),\n      onPressed: () {\n        setState(() {\n          liked = !liked;\n        });\n      },\n    );\n  }\n}"
                  },
                  {
                        "label": "Why setState matters — without it, the UI won't update",
                        "code": "int count = 0;\n\n// Wrong: changes the variable, but the screen never redraws\nvoid wrongIncrement() {\n  count++;\n}\n\n// Right: tells Flutter to rebuild this widget\nvoid rightIncrement() {\n  setState(() {\n    count++;\n  });\n}"
                  }
            ]
      },
      {
            "id": 7,
            "title": "Handling User Input — Taking Orders 📋",
            "difficulty": "Intermediate",
            "analogy": "A TextField is a waiter with a notepad, writing down exactly what the customer says as they say it.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "TextField — a controlled text input",
                        "code": "class NameField extends StatefulWidget {\n  const NameField({super.key});\n\n  @override\n  State<NameField> createState() => _NameFieldState();\n}\n\nclass _NameFieldState extends State<NameField> {\n  String name = '';\n\n  @override\n  Widget build(BuildContext context) {\n    return Column(\n      children: [\n        TextField(\n          onChanged: (value) => setState(() => name = value),\n          decoration: const InputDecoration(labelText: 'Your name'),\n        ),\n        Text('Hello, $name'),\n      ],\n    );\n  }\n}"
                  },
                  {
                        "label": "Buttons and onPressed",
                        "code": "ElevatedButton(\n  onPressed: () {\n    print('Button tapped!');\n  },\n  child: const Text('Tap me'),\n)"
                  }
            ]
      },
      {
            "id": 8,
            "title": "Navigation — Moving Between Screens 🗺️",
            "difficulty": "Intermediate",
            "analogy": "Navigator is a stack of cards. push adds a new screen on top; pop removes it to reveal the one underneath.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "Navigator.push — go to a new screen",
                        "code": "Navigator.push(\n  context,\n  MaterialPageRoute(builder: (context) => const DetailScreen()),\n);"
                  },
                  {
                        "label": "Navigator.pop — go back",
                        "code": "ElevatedButton(\n  onPressed: () => Navigator.pop(context),\n  child: const Text('Go Back'),\n)"
                  },
                  {
                        "label": "Named routes",
                        "code": "MaterialApp(\n  initialRoute: '/',\n  routes: {\n    '/': (context) => const HomeScreen(),\n    '/details': (context) => const DetailScreen(),\n  },\n);\n\n// Navigate with:\nNavigator.pushNamed(context, '/details');"
                  }
            ]
      },
      {
            "id": 9,
            "title": "ListView & Lists of Data — The Scrollable Shelf 📚",
            "difficulty": "Intermediate",
            "analogy": "ListView.builder is a shelf that only builds the books currently in view, not the whole library at once.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "ListView.builder — render a list efficiently",
                        "code": "final items = ['Apple', 'Banana', 'Cherry'];\n\nListView.builder(\n  itemCount: items.length,\n  itemBuilder: (context, index) {\n    return ListTile(title: Text(items[index]));\n  },\n)"
                  },
                  {
                        "label": "A list of custom data",
                        "code": "class AppUser {\n  final String name;\n  final String email;\n  AppUser(this.name, this.email);\n}\n\nfinal users = [\n  AppUser('Alice', 'alice@email.com'),\n  AppUser('Bob', 'bob@email.com'),\n];\n\nWidget buildUserList() {\n  return ListView.builder(\n    itemCount: users.length,\n    itemBuilder: (context, index) {\n      final user = users[index];\n      return ListTile(\n        title: Text(user.name),\n        subtitle: Text(user.email),\n      );\n    },\n  );\n}"
                  }
            ]
      },
      {
            "id": 10,
            "title": "Forms & Validation — Checking the Paperwork 📝",
            "difficulty": "Intermediate",
            "analogy": "A Form is a stack of paperwork with a supervisor (GlobalKey) who checks every field before it's accepted.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "A Form with a GlobalKey",
                        "code": "final formKey = GlobalKey<FormState>();\n\nForm(\n  key: formKey,\n  child: TextFormField(\n    validator: (value) {\n      if (value == null || value.isEmpty) {\n        return 'Please enter your name';\n      }\n      return null;\n    },\n  ),\n)"
                  },
                  {
                        "label": "Validating and submitting",
                        "code": "ElevatedButton(\n  onPressed: () {\n    if (formKey.currentState!.validate()) {\n      print('Form is valid!');\n    }\n  },\n  child: const Text('Submit'),\n)"
                  }
            ]
      },
      {
            "id": 11,
            "title": "Async/Await & Futures — Waiting Patiently 🧍",
            "difficulty": "Intermediate",
            "analogy": "A Future is a claim ticket for something not ready yet. await means: pause here until it's ready, then continue.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "A Future that resolves after a delay",
                        "code": "Future<String> fetchGreeting() async {\n  await Future.delayed(const Duration(seconds: 1));\n  return 'Hello after 1 second!';\n}\n\nvoid loadGreeting() async {\n  final greeting = await fetchGreeting();\n  print(greeting);\n}"
                  },
                  {
                        "label": "Error handling with try/catch",
                        "code": "Future<void> loadData() async {\n  try {\n    final result = await fetchGreeting();\n    print(result);\n  } catch (error) {\n    print('Failed: $error');\n  }\n}"
                  }
            ]
      },
      {
            "id": 12,
            "title": "HTTP Requests — Calling a Friend 📞",
            "difficulty": "Advanced",
            "analogy": "The http package dials an API for you. FutureBuilder answers the phone and decides what to show while it waits.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "GET request with the http package",
                        "code": "// pubspec.yaml: http: ^1.2.0\nimport 'package:http/http.dart' as http;\nimport 'dart:convert';\n\nFuture<void> fetchUsers() async {\n  final response = await http.get(Uri.parse('https://jsonplaceholder.typicode.com/users'));\n  final users = jsonDecode(response.body);\n  print(users.length);\n}"
                  },
                  {
                        "label": "FutureBuilder — show loading, data, and error states",
                        "code": "FutureBuilder<String>(\n  future: fetchGreeting(),\n  builder: (context, snapshot) {\n    if (snapshot.connectionState == ConnectionState.waiting) {\n      return const CircularProgressIndicator();\n    }\n    if (snapshot.hasError) {\n      return Text('Error: ${snapshot.error}');\n    }\n    return Text(snapshot.data ?? '');\n  },\n)"
                  }
            ]
      },
      {
            "id": 13,
            "title": "State Management — Provider — The PA System 📢",
            "difficulty": "Advanced",
            "analogy": "Provider is a PA system: any widget in the tree can listen for announcements without passing data hand-to-hand.",
            "lang": "dart",
            "snippets": [
                  {
                        "label": "A simple ChangeNotifier",
                        "code": "// pubspec.yaml: provider: ^6.1.0\nclass CounterModel extends ChangeNotifier {\n  int count = 0;\n\n  void increment() {\n    count++;\n    notifyListeners();\n  }\n}"
                  },
                  {
                        "label": "Providing and consuming it",
                        "code": "ChangeNotifierProvider(\n  create: (context) => CounterModel(),\n  child: const MyApp(),\n);\n\n// Anywhere below in the tree:\nConsumer<CounterModel>(\n  builder: (context, counter, child) {\n    return Text('Count: ${counter.count}');\n  },\n)"
                  }
            ]
      },
      {
            "id": 14,
            "title": "Packages & pubspec.yaml — The Parts List 📦",
            "difficulty": "Beginner",
            "lang": "yaml",
            "analogy": "pubspec.yaml is the parts list for your project — every package it depends on is written down here.",
            "snippets": [
                  {
                        "label": "Declaring dependencies",
                        "code": "name: my_app\ndescription: A new Flutter project.\nversion: 1.0.0+1\n\ndependencies:\n  flutter:\n    sdk: flutter\n  http: ^1.2.0\n  provider: ^6.1.0"
                  },
                  {
                        "label": "Installing and importing",
                        "runnable": false,
                        "code": "flutter pub get\n\n# then in your Dart file:\nimport 'package:http/http.dart' as http;"
                  }
            ]
      },
      {
            "id": 15,
            "title": "Building & Deploying — Opening the Doors 🚀",
            "difficulty": "Intermediate",
            "lang": "dart",
            "analogy": "flutter build packages your app for the real world — an Android APK, an iOS build, or a web bundle you can host anywhere.",
            "snippets": [
                  {
                        "label": "Build for Android",
                        "runnable": false,
                        "code": "flutter build apk --release"
                  },
                  {
                        "label": "Build for the web",
                        "runnable": false,
                        "code": "flutter build web --release"
                  },
                  {
                        "label": "Run on a connected device or emulator",
                        "runnable": false,
                        "code": "flutter devices\nflutter run -d chrome"
                  }
            ]
      }
];

    const STORAGE_KEY = "flutter-done";

    function initSidebar() {
      const list = document.getElementById("lesson-list");
      LESSONS.forEach(lesson => {
        const item = document.createElement("div");
        item.id = `sidebar-lesson-${lesson.id}`;
        item.className = "sidebar-item";
        item.onclick = () => {
          document.getElementById(`lesson-${lesson.id}`).scrollIntoView({ behavior: "smooth" });
        };
        item.textContent = `${lesson.id}. ${lesson.title.split(" ")[0]}`;
        list.appendChild(item);
      });
    }

    function initLessons() {
      const container = document.getElementById("lessons-container");
      LESSONS.forEach(lesson => {
        const section = document.createElement("section");
        section.id = `lesson-${lesson.id}`;
        section.className = "lesson";
        section.innerHTML = `
          <div style="display: flex; align-items: center; margin-bottom: 16px;">
            <span style="background: #02569b; color: white; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">L${lesson.id}</span>
            <h2 style="font-size: 1.75rem; font-weight: 900; margin: 0 0 0 16px; color: #0f172a;">${lesson.title}</h2>
            <span class="difficulty ${lesson.difficulty.toLowerCase()}">${lesson.difficulty}</span>
          </div>

          <div class="analogy">
            <strong style="color: #075985;">📚 Analogy:</strong> ${lesson.analogy}
          </div>

          <div class="key-points">
            <strong style="color: #166534;">✓ Key Points — each one is its own example below:</strong>
            <ul style="margin: 8px 0 0 0; padding-left: 20px;">
              ${lesson.snippets.map(s => `<li>${s.label}</li>`).join("")}
            </ul>
          </div>

          ${lesson.snippets.map(snippet => `
            <div class="code-block">
              <div class="snippet-label">${escapeHtml(snippet.label)}</div>
              <button class="copy-btn" onclick="copyCode(this)">Copy</button>
              <pre><code class="language-${lesson.lang || "dart"}">${escapeHtml(snippet.code)}</code></pre>
            </div>
          `).join("")}

          <button class="mark-btn" onclick="toggleLesson(${lesson.id})">Mark Complete ✓</button>
        `;
        container.appendChild(section);
      });
      hljs.highlightAll();
    }

    function escapeHtml(text) {
      const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
      return text.replace(/[&<>"']/g, c => map[c]);
    }

    function toggleLesson(id) {
      let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      if (done.includes(id)) {
        done = done.filter(x => x !== id);
      } else {
        done.push(id);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
      updateProgress();
    }

    function updateProgress() {
      const done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      const pct = Math.round((done.length / LESSONS.length) * 100);
      document.getElementById("progress-bar").style.width = pct + "%";
      document.getElementById("progress-text").textContent = `${done.length} / ${LESSONS.length} lessons complete`;
      document.getElementById("progress-counter").textContent = done.length;

      LESSONS.forEach(lesson => {
        const btn = document.querySelector(`#lesson-${lesson.id} .mark-btn`);
        const sidebar = document.getElementById(`sidebar-lesson-${lesson.id}`);
        if (done.includes(lesson.id)) {
          btn.textContent = "✅ Completed!";
          btn.classList.add("completed");
          sidebar.classList.add("completed");
        } else {
          btn.textContent = "Mark Complete ✓";
          btn.classList.remove("completed");
          sidebar.classList.remove("completed");
        }
      });

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".sidebar-item").forEach(item => item.classList.remove("active"));
            const lessonNum = entry.target.id.split("-")[1];
            document.getElementById(`sidebar-lesson-${lessonNum}`)?.classList.add("active");
          }
        });
      }, { threshold: 0.3 });

      document.querySelectorAll(".lesson").forEach(el => observer.observe(el));
    }

    function copyCode(btn) {
      const code = btn.parentElement.querySelector("code").textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = "Copied! ✓";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    function resetProgress() {
      if (confirm("Reset all progress?")) {
        localStorage.removeItem(STORAGE_KEY);
        updateProgress();
      }
    }

    initSidebar();
    initLessons();
    updateProgress();
  </script>
</body>
</html>
