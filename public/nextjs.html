  <script>
    const LESSONS = [
      {
            "id": 1,
            "title": "What is Next.js? — Smart Restaurant 🍽️",
            "difficulty": "Beginner",
            "analogy": "A regular restaurant (React SPA) cooks after you order — you wait. A smart restaurant (Next.js) pre-cooks popular dishes (SSG) AND cooks fresh on demand (SSR).",
            "snippets": [
                  {
                        "label": "Create a new Next.js project",
                        "code": "npx create-next-app@latest my-app --typescript --tailwind\ncd my-app\nnpm run dev"
                  },
                  {
                        "label": "App Router folder structure",
                        "code": "app/\n  layout.tsx      // Root layout\n  page.tsx        // / (home page)\n  about/\n    page.tsx      // /about page\n  blog/\n    page.tsx      // /blog page\n    [slug]/\n      page.tsx    // /blog/:slug (dynamic route)\n  api/\n    users/\n      route.ts    // /api/users (API endpoint)"
                  },
                  {
                        "label": "Run and view your app",
                        "code": "npm run dev\n// Visit http://localhost:3000"
                  }
            ]
      },
      {
            "id": 2,
            "title": "File-Based Routing — Folders Are Rooms 📁",
            "difficulty": "Beginner",
            "analogy": "Each folder in app/ is a room. app/about/page.tsx becomes the /about route — no router config needed!",
            "snippets": [
                  {
                        "label": "app/layout.tsx — the root layout",
                        "code": "export default function RootLayout({ children }) {\n  return (\n    <html>\n      <body>\n        <nav>My App</nav>\n        {children}\n      </body>\n    </html>\n  );\n}"
                  },
                  {
                        "label": "app/page.tsx — the home route (/)",
                        "code": "export default function Home() {\n  return <h1>Welcome home!</h1>;\n}"
                  },
                  {
                        "label": "A nested route: app/about/page.tsx",
                        "code": "export default function About() {\n  return <h1>About us</h1>;\n}"
                  },
                  {
                        "label": "A dynamic route: app/blog/[slug]/page.tsx",
                        "code": "export default function BlogPost({ params }) {\n  return <h1>Blog: {params.slug}</h1>;\n  // /blog/hello-world -> params.slug = \"hello-world\"\n}"
                  },
                  {
                        "label": "Folder structure to URL mapping",
                        "code": "app/page.tsx             -> /\napp/about/page.tsx       -> /about\napp/blog/page.tsx        -> /blog\napp/blog/[slug]/page.tsx -> /blog/my-post\napp/api/users/route.ts   -> /api/users"
                  }
            ]
      },
      {
            "id": 3,
            "title": "Pages & Layouts — House with Shared Walls 🏠",
            "difficulty": "Beginner",
            "analogy": "A house has shared walls, a roof, a front door (the layout). Every room benefits without duplicating it.",
            "snippets": [
                  {
                        "label": "Root layout — wraps every page",
                        "code": "export default function RootLayout({ children }) {\n  return (\n    <html>\n      <body>\n        <nav>Home | About</nav>\n        <main>{children}</main>\n        <footer>Footer content</footer>\n      </body>\n    </html>\n  );\n}"
                  },
                  {
                        "label": "A nested layout for a section",
                        "code": "// app/dashboard/layout.tsx\nexport default function DashboardLayout({ children }) {\n  return (\n    <div style={{ display: 'flex' }}>\n      <aside>Sidebar</aside>\n      <section>{children}</section>\n    </div>\n  );\n}"
                  },
                  {
                        "label": "Pages under a nested layout use both layouts",
                        "code": "// app/dashboard/page.tsx\nexport default function Dashboard() {\n  return <h1>Dashboard Home</h1>;\n}\n\n// app/dashboard/settings/page.tsx\nexport default function Settings() {\n  return <h1>Settings</h1>;\n}"
                  }
            ]
      },
      {
            "id": 4,
            "title": "Server vs Client Components — Chef vs Waiter 👨‍🍳",
            "difficulty": "Intermediate",
            "analogy": "The chef (server) prepares everything; you never see the code. The waiter (client) interacts with customers and reacts to requests.",
            "snippets": [
                  {
                        "label": "Server Component — the default, no 'use client'",
                        "code": "async function Users() {\n  const users = await fetch('https://api.example.com/users').then(r => r.json());\n  return (\n    <ul>\n      {users.map(u => <li key={u.id}>{u.name}</li>)}\n    </ul>\n  );\n}"
                  },
                  {
                        "label": "Client Component — opt in with 'use client'",
                        "code": "'use client';\n\nimport { useState } from 'react';\n\nexport function LikeButton() {\n  const [liked, setLiked] = useState(false);\n  return (\n    <button onClick={() => setLiked(!liked)}>\n      {liked ? '❤️' : '🤍'}\n    </button>\n  );\n}"
                  },
                  {
                        "label": "Mixing: a server component wraps a client component",
                        "code": "export default function Post() {\n  const post = fetchPost();\n  return (\n    <article>\n      <h1>{post.title}</h1>\n      <LikeButton />\n    </article>\n  );\n}"
                  }
            ]
      },
      {
            "id": 5,
            "title": "Data Fetching (SSR) — Fresh Food 🥗",
            "difficulty": "Intermediate",
            "analogy": "Every customer gets fresh food cooked right now with today's ingredients. SSR fetches data fresh on every request.",
            "snippets": [
                  {
                        "label": "Async Server Component with fresh data (SSR)",
                        "code": "export default async function UsersPage() {\n  const res = await fetch('https://jsonplaceholder.typicode.com/users', {\n    cache: 'no-store',\n  });\n  const users = await res.json();\n  return (\n    <ul>\n      {users.map(user => <li key={user.id}>{user.name}</li>)}\n    </ul>\n  );\n}"
                  },
                  {
                        "label": "Suspense — show a loading state while streaming",
                        "code": "import { Suspense } from 'react';\n\nexport default function UsersPageWithSuspense() {\n  return (\n    <Suspense fallback={<p>Loading users...</p>}>\n      <UsersData />\n    </Suspense>\n  );\n}"
                  },
                  {
                        "label": "Errors thrown here are caught by error.tsx",
                        "code": "async function UsersData() {\n  const res = await fetch('https://api.example.com/users');\n  if (!res.ok) throw new Error('Failed to fetch');\n  const users = await res.json();\n  return <ul>{users.map(u => <li key={u.id}>{u.name}</li>)}</ul>;\n}"
                  }
            ]
      },
      {
            "id": 6,
            "title": "Static Generation (SSG) — Pre-Made Food 📦",
            "difficulty": "Intermediate",
            "analogy": "A food-prep company makes 1000 sandwiches Sunday, boxes them, and hands them out all week. Ultra fast!",
            "snippets": [
                  {
                        "label": "A page with ISR (revalidate every hour)",
                        "code": "export default async function BlogPost({ params }) {\n  const res = await fetch(\n    `https://api.example.com/posts/${params.slug}`,\n    { next: { revalidate: 3600 } }\n  );\n  const post = await res.json();\n  return (\n    <article>\n      <h1>{post.title}</h1>\n      <p>{post.content}</p>\n    </article>\n  );\n}"
                  },
                  {
                        "label": "generateStaticParams — pre-build known pages",
                        "code": "export async function generateStaticParams() {\n  const posts = await fetch('https://api.example.com/posts').then(r => r.json());\n  return posts.map(post => ({ slug: post.slug }));\n}"
                  },
                  {
                        "label": "Caching aggressively for rarely-changing data",
                        "code": "export default async function Posts() {\n  const res = await fetch('https://api.example.com/posts', {\n    next: { revalidate: 86400 },\n  });\n  const posts = await res.json();\n  return <div>{posts.length} posts</div>;\n}"
                  }
            ]
      },
      {
            "id": 7,
            "title": "API Routes — Kitchen's Back Door 🚪",
            "difficulty": "Intermediate",
            "analogy": "The kitchen has a back door for deliveries and supplies. API routes are that back door: backend endpoints with no code exposed to the browser.",
            "snippets": [
                  {
                        "label": "GET /api/users",
                        "code": "// app/api/users/route.ts\nimport { NextResponse } from 'next/server';\n\nexport async function GET() {\n  const users = [\n    { id: 1, name: 'Alice' },\n    { id: 2, name: 'Bob' },\n  ];\n  return NextResponse.json(users);\n}"
                  },
                  {
                        "label": "POST /api/users",
                        "code": "export async function POST(request) {\n  const body = await request.json();\n  return NextResponse.json({ created: body }, { status: 201 });\n}"
                  },
                  {
                        "label": "A dynamic route handler: app/api/users/[id]/route.ts",
                        "code": "export async function GET(request, { params }) {\n  const user = { id: params.id, name: 'Alice' };\n  return NextResponse.json(user);\n}"
                  },
                  {
                        "label": "PUT and DELETE handlers",
                        "code": "export async function PUT(request, { params }) {\n  const body = await request.json();\n  return NextResponse.json({ updated: body });\n}\n\nexport async function DELETE(request, { params }) {\n  return new NextResponse(null, { status: 204 });\n}"
                  }
            ]
      },
      {
            "id": 8,
            "title": "Dynamic Routes & Params — Named Doors 🚪🔢",
            "difficulty": "Intermediate",
            "analogy": "A hotel with numbered rooms [101], [102], [103] — same door design, different room. Dynamic routes work the same way.",
            "snippets": [
                  {
                        "label": "[slug] — a single dynamic segment",
                        "code": "// app/blog/[slug]/page.tsx\nexport default function BlogPost({ params }) {\n  return <h1>Post: {params.slug}</h1>;\n  // /blog/hello-world -> params.slug = \"hello-world\"\n}"
                  },
                  {
                        "label": "[...path] — a catch-all segment",
                        "code": "// app/docs/[...path]/page.tsx\nexport default function Docs({ params }) {\n  return <p>Path: {params.path.join('/')}</p>;\n  // /docs/guide/intro -> params.path = ['guide', 'intro']\n}"
                  },
                  {
                        "label": "[[...slug]] — an optional catch-all",
                        "code": "// app/pages/[[...slug]]/page.tsx\nexport default function Pages({ params }) {\n  return <p>Slug: {params.slug?.join('/') || 'home'}</p>;\n  // /pages -> params.slug = undefined\n}"
                  },
                  {
                        "label": "generateMetadata — dynamic page metadata",
                        "code": "export async function generateMetadata({ params }) {\n  const post = await fetchPost(params.slug);\n  return { title: post.title, description: post.excerpt };\n}"
                  },
                  {
                        "label": "notFound() — trigger the 404 page",
                        "code": "import { notFound } from 'next/navigation';\n\nexport default async function BlogPost({ params }) {\n  const post = await fetchPost(params.slug);\n  if (!post) notFound();\n  return <article>{post.content}</article>;\n}"
                  }
            ]
      },
      {
            "id": 9,
            "title": "Image Optimization & Metadata 📸🏷️",
            "difficulty": "Beginner",
            "analogy": "A smart camera auto-resizes photos. Metadata is like labels on a lunchbox — title, description, sharing image.",
            "snippets": [
                  {
                        "label": "next/image — automatic optimization",
                        "code": "import Image from 'next/image';\n\nexport default function Gallery() {\n  return (\n    <Image\n      src=\"/photo.jpg\"\n      alt=\"My photo\"\n      width={800}\n      height={600}\n      priority\n    />\n  );\n}"
                  },
                  {
                        "label": "Static metadata for SEO",
                        "code": "export const metadata = {\n  title: 'My Amazing App',\n  description: 'The best app ever built',\n  openGraph: {\n    title: 'My Amazing App',\n    images: ['/og-image.jpg'],\n  },\n};"
                  },
                  {
                        "label": "Dynamic metadata per page",
                        "code": "export async function generateMetadata({ params }) {\n  const product = await fetchProduct(params.id);\n  return {\n    title: product.name,\n    description: product.description,\n  };\n}"
                  }
            ]
      },
      {
            "id": 10,
            "title": "Middleware — Security Guard 👮",
            "difficulty": "Advanced",
            "analogy": "A security guard at the school entrance. Everyone passes through — the guard checks ID, redirects visitors, and logs entries.",
            "snippets": [
                  {
                        "label": "middleware.ts — runs before matching requests",
                        "code": "import { NextResponse } from 'next/server';\n\nexport function middleware(request) {\n  const token = request.cookies.get('token');\n  const isProtected = request.nextUrl.pathname.startsWith('/dashboard');\n\n  if (isProtected && !token) {\n    return NextResponse.redirect(new URL('/login', request.url));\n  }\n  return NextResponse.next();\n}"
                  },
                  {
                        "label": "config.matcher — choose which routes run it",
                        "code": "export const config = {\n  matcher: ['/dashboard/:path*', '/api/protected/:path*'],\n};"
                  },
                  {
                        "label": "Redirect, rewrite, or continue",
                        "code": "NextResponse.redirect(new URL('/login', request.url));\nNextResponse.rewrite(new URL('/api/auth', request.url));\nNextResponse.next();"
                  }
            ]
      },
      {
            "id": 11,
            "title": "Environment Variables — Secret Diary 🔐",
            "difficulty": "Beginner",
            "analogy": "A secret diary with a lock. Some secrets are for everyone (NEXT_PUBLIC_), some are for the server only.",
            "snippets": [
                  {
                        "label": ".env.local — development secrets (never commit)",
                        "code": "DATABASE_URL=postgresql://user:pass@localhost:5432/mydb\nJWT_SECRET=my-secret-key-never-share-this\nNEXT_PUBLIC_API_URL=https://api.myapp.com"
                  },
                  {
                        "label": "Server-only vs NEXT_PUBLIC_ variables",
                        "code": "// Server components / route handlers only\nconst dbUrl = process.env.DATABASE_URL;\nconst secret = process.env.JWT_SECRET;\n\n// Safe to expose to the browser\nconst apiUrl = process.env.NEXT_PUBLIC_API_URL;"
                  },
                  {
                        "label": ".env.example — a safe template to commit",
                        "code": "DATABASE_URL=\nJWT_SECRET=\nNEXT_PUBLIC_API_URL="
                  }
            ]
      },
      {
            "id": 12,
            "title": "Deploy on Railway — Opening Your Restaurant 🚀",
            "difficulty": "Intermediate",
            "analogy": "You have cooked in your home kitchen. Now open a real restaurant (Railway) — move in, plug in, open doors!",
            "snippets": [
                  {
                        "label": "Push your Next.js app to GitHub",
                        "code": "git add .\ngit commit -m \"Deploy to Railway\"\ngit push origin main"
                  },
                  {
                        "label": "Deploy from GitHub on railway.com",
                        "code": "// railway.com -> New Project -> Deploy from GitHub Repo\n// Railway auto-detects Next.js:\n//   builds with npm run build\n//   runs with npm start"
                  },
                  {
                        "label": "Set environment variables in the dashboard",
                        "code": "// Railway -> Variables tab\nDATABASE_URL=postgresql://...\nJWT_SECRET=your-secret\nNODE_ENV=production"
                  },
                  {
                        "label": "next.config.js — read a Railway-provided value",
                        "code": "module.exports = {\n  env: {\n    NEXT_PUBLIC_API_URL: process.env.RAILWAY_DOMAIN || 'http://localhost:3000',\n  },\n};"
                  }
            ]
      }
];


    const STORAGE_KEY = "next-done";

    function initSidebar() {
      const list = document.getElementById("lesson-list");
      LESSONS.forEach(lesson => {
        const item = document.createElement("div");
        item.id = `sidebar-lesson-${lesson.id}`;
        item.className = "sidebar-item";
        item.onclick = () => {
          document.getElementById(`lesson-${lesson.id}`).scrollIntoView({ behavior: "smooth" });
        };
        item.textContent = `${lesson.id}. ${lesson.title.split(" ")[0]}`;
        list.appendChild(item);
      });
    }

    function initLessons() {
      const container = document.getElementById("lessons-container");
      LESSONS.forEach(lesson => {
        const section = document.createElement("section");
        section.id = `lesson-${lesson.id}`;
        section.className = "lesson";
        section.innerHTML = `
          <div style="display: flex; align-items: center; margin-bottom: 16px;">
            <span style="background: #374151; color: white; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">L${lesson.id}</span>
            <h2 style="font-size: 1.75rem; font-weight: 900; margin: 0 0 0 16px; color: #0f172a;">${lesson.title}</h2>
            <span class="difficulty ${lesson.difficulty.toLowerCase()}">${lesson.difficulty}</span>
          </div>

          <div class="analogy">
            <strong style="color: #6b7280;">📚 Analogy:</strong> ${lesson.analogy}
          </div>

          <div class="key-points">
            <strong style="color: #166534;">✓ Key Points — each one is its own example below:</strong>
            <ul style="margin: 8px 0 0 0; padding-left: 20px;">
              ${lesson.snippets.map(s => `<li>${s.label}</li>`).join("")}
            </ul>
          </div>

          ${lesson.snippets.map(snippet => `
            <div class="code-block">
              <div class="snippet-label">${escapeHtml(snippet.label)}</div>
              <button class="copy-btn" onclick="copyCode(this)">Copy</button>
              <pre><code class="language-typescript">${escapeHtml(snippet.code)}</code></pre>
            </div>
          `).join("")}

          <button class="mark-btn" onclick="toggleLesson(${lesson.id})">Mark Complete ✓</button>
        `;
        container.appendChild(section);
      });
      hljs.highlightAll();
    }

    function escapeHtml(text) {
      const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
      return text.replace(/[&<>"']/g, c => map[c]);
    }

    function toggleLesson(id) {
      let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      if (done.includes(id)) {
        done = done.filter(x => x !== id);
      } else {
        done.push(id);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
      updateProgress();
    }

    function updateProgress() {
      const done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      const pct = Math.round((done.length / LESSONS.length) * 100);
      document.getElementById("progress-bar").style.width = pct + "%";
      document.getElementById("progress-text").textContent = `${done.length} / ${LESSONS.length} lessons complete`;
      document.getElementById("progress-counter").textContent = done.length;

      LESSONS.forEach(lesson => {
        const btn = document.querySelector(`#lesson-${lesson.id} .mark-btn`);
        const sidebar = document.getElementById(`sidebar-lesson-${lesson.id}`);
        if (done.includes(lesson.id)) {
          btn.textContent = "✅ Completed!";
          btn.classList.add("completed");
          sidebar.classList.add("completed");
        } else {
          btn.textContent = "Mark Complete ✓";
          btn.classList.remove("completed");
          sidebar.classList.remove("completed");
        }
      });

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".sidebar-item").forEach(item => item.classList.remove("active"));
            const lessonNum = entry.target.id.split("-")[1];
            document.getElementById(`sidebar-lesson-${lessonNum}`)?.classList.add("active");
          }
        });
      }, { threshold: 0.3 });

      document.querySelectorAll(".lesson").forEach(el => observer.observe(el));
    }

    function copyCode(btn) {
      const code = btn.parentElement.querySelector("code").textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = "Copied! ✓";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    function resetProgress() {
      if (confirm("Reset all progress?")) {
        localStorage.removeItem(STORAGE_KEY);
        updateProgress();
      }
    }

    initSidebar();
    initLessons();
    updateProgress();
  </script>
</body>
</html>
