  <script>
    const LESSONS = [
      {
            "id": 1,
            "title": "Variables — Magic Boxes 📦",
            "difficulty": "Beginner",
            "analogy": "Imagine you have magic boxes where you can store anything — toys, books, snacks. Each box has a label so you know what is inside. `let` is a box you can swap contents. `const` is a sealed box you never change. `var` is an old leaky box — avoid it!",
            "snippets": [
                  {
                        "label": "let — create and change a value",
                        "code": "let score = 10;\nscore = 20;\nconsole.log(score);"
                  },
                  {
                        "label": "const — create but never change",
                        "code": "const PI = 3.14159;\nconsole.log(PI);\n\ntry {\n  PI = 3;\n} catch (error) {\n  console.log(\"Error:\", error.message);\n}"
                  },
                  {
                        "label": "var — legacy, avoid it",
                        "code": "var oldStyle = \"avoid var in modern JS\";\nconsole.log(oldStyle);"
                  },
                  {
                        "label": "Naming — use camelCase",
                        "code": "let myAge = 25;\nlet userFirstName = \"Alice\";\nconsole.log(myAge, userFirstName);"
                  }
            ]
      },
      {
            "id": 2,
            "title": "Data Types — Types of Toys 🧸",
            "difficulty": "Beginner",
            "analogy": "Different toys go in different boxes — LEGO (numbers), storybooks (strings), yes/no cards (booleans), empty box (null/undefined).",
            "snippets": [
                  {
                        "label": "String — text in quotes",
                        "code": "const name = \"Alice\";\nconsole.log(name, typeof name);"
                  },
                  {
                        "label": "Number — integers and decimals",
                        "code": "const age = 25;\nconst price = 19.99;\nconsole.log(age, price, typeof age);"
                  },
                  {
                        "label": "Boolean — true or false only",
                        "code": "const isActive = true;\nconsole.log(isActive, typeof isActive);"
                  },
                  {
                        "label": "typeof — check a data type",
                        "code": "const list = [1, 2, 3];\nconst data = { x: 1 };\nconsole.log(typeof list, typeof data);"
                  },
                  {
                        "label": "null vs undefined",
                        "code": "const job = null;\nlet hobby;\nconsole.log(job, typeof job);\nconsole.log(hobby, typeof hobby);"
                  }
            ]
      },
      {
            "id": 3,
            "title": "Operators — Math on the Playground ➕",
            "difficulty": "Beginner",
            "analogy": "Arithmetic operators are like math class. Comparison operators ask who is taller. Logical operators are AND/OR game rules.",
            "snippets": [
                  {
                        "label": "Arithmetic operators",
                        "code": "console.log(10 + 5, 10 - 3, 4 * 3, 20 / 4, 10 % 3, 2 ** 3);"
                  },
                  {
                        "label": "=== vs == (use === instead of ==)",
                        "code": "console.log(5 === 5);\nconsole.log(5 === \"5\");\nconsole.log(5 == \"5\");"
                  },
                  {
                        "label": "Logical: && (and), || (or), ! (not)",
                        "code": "console.log(true && true);\nconsole.log(true || false);\nconsole.log(!true);"
                  },
                  {
                        "label": "Ternary ? : for quick if/else",
                        "code": "const age = 20;\nconst msg = age >= 18 ? \"Adult\" : \"Minor\";\nconsole.log(msg);"
                  }
            ]
      },
      {
            "id": 4,
            "title": "String Methods — Playing with Words ✂️",
            "difficulty": "Beginner",
            "analogy": "Strings are like a string of beads. You can cut them, count them, find a bead, replace one.",
            "snippets": [
                  {
                        "label": ".length — how many characters",
                        "code": "const text = \"Hello World\";\nconsole.log(text.length);"
                  },
                  {
                        "label": ".toUpperCase / .toLowerCase",
                        "code": "const text = \"Hello World\";\nconsole.log(text.toUpperCase());\nconsole.log(text.toLowerCase());"
                  },
                  {
                        "label": ".includes / .startsWith / .indexOf",
                        "code": "const text = \"Hello World\";\nconsole.log(text.includes(\"World\"));\nconsole.log(text.startsWith(\"Hello\"));\nconsole.log(text.indexOf(\"o\"));"
                  },
                  {
                        "label": ".slice — extract part of a string",
                        "code": "const text = \"Hello World\";\nconsole.log(text.slice(0, 5));"
                  },
                  {
                        "label": ".split — break into an array",
                        "code": "const text = \"Hello World\";\nconsole.log(text.split(\" \"));"
                  },
                  {
                        "label": ".replace — change text",
                        "code": "const text = \"Hello World\";\nconsole.log(text.replace(\"World\", \"JS\"));"
                  },
                  {
                        "label": ".trim — remove surrounding spaces",
                        "code": "console.log(\"  hi  \".trim());"
                  }
            ]
      },
      {
            "id": 5,
            "title": "Template Literals — Mad Libs 📝",
            "difficulty": "Beginner",
            "analogy": "Mad Libs game — you have a sentence with blanks and fill in the blanks with words.",
            "snippets": [
                  {
                        "label": "Backticks and ${ } for variables",
                        "code": "const name = \"Alice\";\nconst age = 25;\nconsole.log(`Hello, I am ${name}, ${age} years old`);"
                  },
                  {
                        "label": "Any JS expression works inside ${ }",
                        "code": "const x = 5;\nconst y = 3;\nconsole.log(`${x} + ${y} = ${x + y}`);"
                  },
                  {
                        "label": "Multi-line strings",
                        "code": "const poem = `Roses are red\nViolets are blue`;\nconsole.log(poem);"
                  }
            ]
      },
      {
            "id": 6,
            "title": "If / Else — Choosing a Path in a Maze 🌿",
            "difficulty": "Beginner",
            "analogy": "A maze has forks. If it is raining, take the umbrella. Else, go without. You can have many forks (else if).",
            "snippets": [
                  {
                        "label": "if / else if / else",
                        "code": "const age = 20;\nif (age < 13) {\n  console.log(\"Child\");\n} else if (age < 18) {\n  console.log(\"Teen\");\n} else {\n  console.log(\"Adult\");\n}"
                  },
                  {
                        "label": "Nested if",
                        "code": "const age = 20;\nconst hasLicense = true;\nif (age >= 18) {\n  console.log(hasLicense ? \"Can drive\" : \"Get a license first\");\n}"
                  },
                  {
                        "label": "Ternary shorthand",
                        "code": "const age = 20;\nconsole.log(age >= 18 ? \"Adult\" : \"Minor\");"
                  }
            ]
      },
      {
            "id": 7,
            "title": "Switch Statement — TV Remote 📺",
            "difficulty": "Beginner",
            "analogy": "A TV remote has numbered buttons. Press 1, channel 1. Press 2, channel 2. Switch lets you check one value against many options.",
            "snippets": [
                  {
                        "label": "switch / case / break / default",
                        "code": "const day = 3;\nlet dayName;\nswitch (day) {\n  case 1: dayName = \"Monday\"; break;\n  case 2: dayName = \"Tuesday\"; break;\n  case 3: dayName = \"Wednesday\"; break;\n  default: dayName = \"Unknown\";\n}\nconsole.log(dayName);"
                  },
                  {
                        "label": "Fall-through (no break)",
                        "code": "const grade = \"B\";\nswitch (grade) {\n  case \"A\":\n  case \"B\":\n    console.log(\"Good!\");\n    break;\n  case \"C\":\n    console.log(\"Pass\");\n    break;\n}"
                  }
            ]
      },
      {
            "id": 8,
            "title": "Loops — Running Laps at PE 🏃",
            "difficulty": "Beginner",
            "analogy": "PE teacher says run 5 laps! You do not stop until 5. A for loop is the same.",
            "snippets": [
                  {
                        "label": "for — loop an exact number of times",
                        "code": "for (let i = 1; i <= 5; i++) {\n  console.log(`Lap ${i}`);\n}"
                  },
                  {
                        "label": "while — loop until a condition is false",
                        "code": "let count = 0;\nwhile (count < 3) {\n  console.log(`Count: ${count}`);\n  count++;\n}"
                  },
                  {
                        "label": "do-while — always runs at least once",
                        "code": "let x = 10;\ndo {\n  console.log(\"Runs once even though x is already 10\");\n  x++;\n} while (x < 10);"
                  },
                  {
                        "label": "break — exit a loop early",
                        "code": "for (let i = 0; i < 10; i++) {\n  if (i === 5) break;\n  console.log(i);\n}"
                  },
                  {
                        "label": "continue — skip to the next iteration",
                        "code": "for (let i = 0; i < 5; i++) {\n  if (i === 2) continue;\n  console.log(i);\n}"
                  }
            ]
      },
      {
            "id": 9,
            "title": "Functions — Recipe Book 📗",
            "difficulty": "Beginner",
            "analogy": "A recipe is instructions you follow any time. You give it ingredients (parameters), it gives you food (return value).",
            "snippets": [
                  {
                        "label": "Function declaration + call",
                        "code": "function greet(name, age) {\n  console.log(`Hello ${name}, you are ${age}`);\n}\ngreet(\"Alice\", 25);"
                  },
                  {
                        "label": "return — send a value back",
                        "code": "function add(a, b) {\n  return a + b;\n}\nconsole.log(add(5, 3));"
                  },
                  {
                        "label": "Default parameters",
                        "code": "function sayHi(name = \"Friend\") {\n  console.log(`Hi ${name}!`);\n}\nsayHi();\nsayHi(\"Alice\");"
                  },
                  {
                        "label": "Function expression",
                        "code": "const multiply = function (x, y) {\n  return x * y;\n};\nconsole.log(multiply(4, 5));"
                  }
            ]
      },
      {
            "id": 10,
            "title": "Arrow Functions — Shortcut Recipes ⚡",
            "difficulty": "Intermediate",
            "analogy": "A sticky note version of a recipe — same result, less writing.",
            "snippets": [
                  {
                        "label": "Arrow function vs traditional function",
                        "code": "function add(a, b) { return a + b; }\nconst add2 = (a, b) => a + b;\nconsole.log(add(2, 3), add2(2, 3));"
                  },
                  {
                        "label": "Implicit return, one param, no params",
                        "code": "const square = x => x * x;\nconst greet = () => \"Hello!\";\nconsole.log(square(4), greet());"
                  },
                  {
                        "label": "Arrow functions with array methods",
                        "code": "const numbers = [1, 2, 3, 4, 5];\nconst doubled = numbers.map(n => n * 2);\nconsole.log(doubled);"
                  },
                  {
                        "label": "Arrow functions do not have their own this",
                        "code": "const obj = {\n  name: \"Alice\",\n  normalFunc() { console.log(this.name); },\n  arrowFunc: () => console.log(this.name),\n};\nobj.normalFunc();\nobj.arrowFunc();"
                  }
            ]
      },
      {
            "id": 11,
            "title": "Arrays — Shopping List 🛒",
            "difficulty": "Beginner",
            "analogy": "A shopping list is an ordered list. Each item has a position (index). You can add or remove items.",
            "snippets": [
                  {
                        "label": "Index (starts at 0) and length",
                        "code": "const list = [\"apples\", \"bananas\", \"milk\", \"bread\"];\nconsole.log(list[0], list[2], list.length);"
                  },
                  {
                        "label": "push / pop — add/remove from the end",
                        "code": "const list = [\"apples\", \"bananas\"];\nlist.push(\"eggs\");\nconsole.log(list);\nconst removed = list.pop();\nconsole.log(removed, list);"
                  },
                  {
                        "label": "unshift / shift — add/remove from the start",
                        "code": "const list = [\"apples\", \"bananas\"];\nlist.unshift(\"butter\");\nconsole.log(list);\nlist.shift();\nconsole.log(list);"
                  },
                  {
                        "label": "includes / indexOf — search",
                        "code": "const list = [\"apples\", \"bananas\", \"milk\"];\nconsole.log(list.includes(\"milk\"), list.indexOf(\"apples\"));"
                  },
                  {
                        "label": "reverse / join — combine into a string",
                        "code": "const list = [\"apples\", \"bananas\", \"milk\"];\nconsole.log(list.reverse().join(\", \"));"
                  }
            ]
      },
      {
            "id": 12,
            "title": "Array Methods — Toy Sorting Machine 🏭",
            "difficulty": "Intermediate",
            "analogy": "Imagine a machine: map paints every toy new, filter keeps only red ones, reduce counts the total value.",
            "snippets": [
                  {
                        "label": "map — transform every element",
                        "code": "const numbers = [1, 2, 3, 4, 5];\nconsole.log(numbers.map(n => n * 2));"
                  },
                  {
                        "label": "filter — keep matching items",
                        "code": "const numbers = [1, 2, 3, 4, 5];\nconsole.log(numbers.filter(n => n % 2 === 0));"
                  },
                  {
                        "label": "reduce — combine into a single value",
                        "code": "const numbers = [1, 2, 3, 4, 5];\nconsole.log(numbers.reduce((total, n) => total + n, 0));"
                  },
                  {
                        "label": "find — get the first match",
                        "code": "const numbers = [1, 2, 3, 4, 5];\nconsole.log(numbers.find(n => n % 2 === 0));"
                  },
                  {
                        "label": "some / every — check conditions",
                        "code": "const numbers = [1, 2, 3, 4, 5];\nconsole.log(numbers.some(n => n > 4));\nconsole.log(numbers.every(n => n > 0));"
                  },
                  {
                        "label": "Chaining methods together",
                        "code": "const numbers = [1, 2, 3, 4, 5];\nconst result = numbers\n  .filter(n => n > 2)\n  .map(n => n * 2)\n  .reduce((a, b) => a + b, 0);\nconsole.log(result);"
                  }
            ]
      },
      {
            "id": 13,
            "title": "Objects — Student ID Card 🪪",
            "difficulty": "Intermediate",
            "analogy": "A student ID has a name, age, school. Objects group related info (properties) and abilities (methods).",
            "snippets": [
                  {
                        "label": "Dot notation vs bracket notation",
                        "code": "const user = { name: \"Alice\", age: 25, email: \"alice@email.com\" };\nconsole.log(user.name, user[\"email\"]);"
                  },
                  {
                        "label": "Add, modify, and delete properties",
                        "code": "const user = { name: \"Alice\", age: 25 };\nuser.age = 26;\nuser.city = \"NYC\";\ndelete user.age;\nconsole.log(user);"
                  },

    const STORAGE_KEY = "js-done";

        list.appendChild(item);

    function initLessons() {
      const container = document.getElementById("lessons-container");
      LESSONS.forEach(lesson => {
        const section = document.createElement("section");
        section.id = `lesson-${lesson.id}`;
        section.className = "lesson";
        section.innerHTML = `
          <div style="display: flex; align-items: center; margin-bottom: 16px;">

    function escapeHtml(text) {
      const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
      return text.replace(/[&<>"']/g, c => map[c]);
    }

    function getSandboxRoot(lesson) {
      if (!lesson.sandboxHtml) return null;
      let root = document.getElementById(`sandbox-${lesson.id}`);
      if (!root) {
        root = document.createElement("div");
        root.id = `sandbox-${lesson.id}`;
        root.style.cssText = "position:absolute; left:-9999px; top:-9999px; width:300px;";
        document.body.appendChild(root);
      }
      root.innerHTML = lesson.sandboxHtml;
      return root;
    }

    function formatLogArg(arg) {
      if (arg === undefined) return "undefined";
      if (typeof arg === "object" && arg !== null) {
        try { return JSON.stringify(arg); } catch (e) { return String(arg); }
      }
      return String(arg);
    }

    function runSnippet(lessonId, index) {
      const lesson = LESSONS.find(l => l.id === lessonId);
      const snippet = lesson.snippets[index];
      const outEl = document.getElementById(`output-${lessonId}-${index}`);
      outEl.style.display = "block";
      outEl.classList.remove("error");
      outEl.textContent = "";

      const appendLine = (line) => {
        outEl.textContent += (outEl.textContent ? "\n" : "") + line;
      };

      const fakeConsole = {
        log: (...args) => appendLine(args.map(formatLogArg).join(" ")),
        warn: (...args) => appendLine("⚠ " + args.map(formatLogArg).join(" ")),
        error: (...args) => appendLine("✗ " + args.map(formatLogArg).join(" ")),
      };

      const sandboxRoot = lesson.sandboxHtml ? getSandboxRoot(lesson) : null;
      const fakeDocument = sandboxRoot ? {
        querySelector: (sel) => sandboxRoot.querySelector(sel),
        querySelectorAll: (sel) => sandboxRoot.querySelectorAll(sel),
        getElementById: (id) => sandboxRoot.querySelector("#" + id),
        createElement: (tag) => document.createElement(tag),
        addEventListener: (ev, cb) => sandboxRoot.addEventListener(ev, cb),
        dispatchEvent: (ev) => sandboxRoot.dispatchEvent(ev),
        body: sandboxRoot,
      } : document;

      try {
        const run = new Function("console", "document", snippet.code);
        run(fakeConsole, fakeDocument);
        if (!outEl.textContent) {
          outEl.textContent = "✅ Ran with no console output";
        }
      } catch (error) {
        outEl.classList.add("error");
        outEl.textContent = "✗ " + error.message;
      }
    }

    function toggleLesson(id) {
      let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      if (done.includes(id)) {
        done = done.filter(x => x !== id);
      } else {
        done.push(id);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
      updateProgress();
    }

    function updateProgress() {
      const done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      const pct = Math.round((done.length / LESSONS.length) * 100);
      document.getElementById("progress-bar").style.width = pct + "%";
      document.getElementById("progress-text").textContent = `${done.length} / ${LESSONS.length} lessons complete`;
      document.getElementById("progress-counter").textContent = done.length;

      LESSONS.forEach(lesson => {
        const btn = document.querySelector(`#lesson-${lesson.id} .mark-btn`);
        const sidebar = document.getElementById(`sidebar-lesson-${lesson.id}`);
        if (done.includes(lesson.id)) {
          btn.textContent = "✅ Completed!";
          btn.classList.add("completed");
          sidebar.classList.add("completed");
        } else {
          btn.textContent = "Mark Complete ✓";
          btn.classList.remove("completed");
          sidebar.classList.remove("completed");
        }
      });

      // Intersection Observer for active lesson
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".sidebar-item").forEach(item => item.classList.remove("active"));
            const lessonNum = entry.target.id.split("-")[1];
            document.getElementById(`sidebar-lesson-${lessonNum}`)?.classList.add("active");
          }
        });
      }, { threshold: 0.3 });

      document.querySelectorAll(".lesson").forEach(el => observer.observe(el));
    }

    function copyCode(btn) {
      const code = btn.parentElement.querySelector("code").textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = "Copied! ✓";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    function resetProgress() {
      if (confirm("Reset all progress?")) {
        localStorage.removeItem(STORAGE_KEY);
        updateProgress();
      }
    }

    initSidebar();
    initLessons();
    updateProgress();
  </script>
</body>
</html>
