  <script>
    const LESSONS = [
      {
            "id": 1,
            "title": "What is React? — LEGO Blocks 🧩",
            "difficulty": "Beginner",
            "analogy": "LEGO bricks you build once and reuse everywhere. Each brick (component) looks the same each time. React builds websites from reusable UI components.",
            "snippets": [
                  {
                        "label": "A React component returns JSX",
                        "code": "function App() {\n  return (\n    <div>\n      <h1>Hello, React!</h1>\n      <p>I am a React app built with components.</p>\n    </div>\n  );\n}\n\nrender(<App />);"
                  },
                  {
                        "label": "Components are reusable pieces",
                        "code": "function Greeting() {\n  return <p>Hi there!</p>;\n}\n\nfunction App() {\n  return (\n    <div>\n      <Greeting />\n      <Greeting />\n      <Greeting />\n    </div>\n  );\n}\n\nrender(<App />);"
                  },
                  {
                        "label": "Creating a real project with Vite",
                        "runnable": false,
                        "code": "npm create vite@latest my-app -- --template react\ncd my-app\nnpm run dev"
                  }
            ]
      },
      {
            "id": 2,
            "title": "JSX — HTML Inside JS 🤝",
            "difficulty": "Beginner",
            "analogy": "JSX is like sending a letter (HTML) inside a box (JavaScript). It looks like HTML but lives in JS files.",
            "snippets": [
                  {
                        "label": "className instead of class",
                        "code": "function Profile() {\n  return (\n    <div className=\"card\">\n      <h1>Alice</h1>\n      <img src=\"https://placekitten.com/80/80\" alt=\"profile\" />\n    </div>\n  );\n}\n\nrender(<Profile />);"
                  },
                  {
                        "label": "Embed JavaScript expressions with { }",
                        "code": "function Greeting() {\n  const name = \"Bob\";\n  const age = 25;\n  return (\n    <div>\n      <p>Hello, {name}!</p>\n      <p>Age: {age}</p>\n    </div>\n  );\n}\n\nrender(<Greeting />);"
                  },
                  {
                        "label": "Conditional rendering with && and ?",
                        "code": "function Status() {\n  const isActive = true;\n  const age = 25;\n  return (\n    <div>\n      {isActive && <p>Currently online</p>}\n      {age > 18 ? <p>Adult</p> : <p>Minor</p>}\n    </div>\n  );\n}\n\nrender(<Status />);"
                  },
                  {
                        "label": "Fragments — return multiple elements without a wrapper div",
                        "code": "function Multiple() {\n  return (\n    <>\n      <h1>Title</h1>\n      <p>Content</p>\n    </>\n  );\n}\n\nrender(<Multiple />);"
                  }
            ]
      },
      {
            "id": 3,
            "title": "Functional Components — Molds 🏺",
            "difficulty": "Beginner",
            "analogy": "A mold for making cookies — every cookie looks the same but is separate. Components are functions returning JSX.",
            "snippets": [
                  {
                        "label": "A component is just a function that returns JSX",
                        "code": "function Button() {\n  return <button>Click me</button>;\n}\n\nrender(<Button />);"
                  },
                  {
                        "label": "A component with more content",
                        "code": "function Card() {\n  return (\n    <div className=\"card\">\n      <h2>Card Title</h2>\n      <p>Card content goes here</p>\n    </div>\n  );\n}\n\nrender(<Card />);"
                  },
                  {
                        "label": "Composing components together",
                        "code": "function Card() {\n  return <div className=\"card\">A card</div>;\n}\n\nfunction App() {\n  return (\n    <div>\n      <Card />\n      <Card />\n      <Card />\n    </div>\n  );\n}\n\nrender(<App />);"
                  }
            ]
      },
      {
            "id": 4,
            "title": "Props — Passing Notes 📝",
            "difficulty": "Beginner",
            "analogy": "Props are like passing a note to a friend. You write info on the note, the friend reads it. Props are read-only!",
            "snippets": [
                  {
                        "label": "Reading props with props.name",
                        "code": "function UserCard(props) {\n  return (\n    <div className=\"card\">\n      <h2>{props.name}</h2>\n      <p>Email: {props.email}</p>\n    </div>\n  );\n}\n\nrender(<UserCard name=\"Alice\" email=\"alice@email.com\" />);"
                  },
                  {
                        "label": "Destructuring props (cleaner)",
                        "code": "function UserCard({ name, email, age }) {\n  return (\n    <div className=\"card\">\n      <h2>{name}</h2>\n      <p>Email: {email}</p>\n      <p>Age: {age}</p>\n    </div>\n  );\n}\n\nrender(<UserCard name=\"Alice\" email=\"alice@email.com\" age={25} />);"
                  },
                  {
                        "label": "Passing different props to the same component",
                        "code": "function UserCard({ name, email }) {\n  return <p>{name} — {email}</p>;\n}\n\nfunction App() {\n  return (\n    <div>\n      <UserCard name=\"Alice\" email=\"alice@email.com\" />\n      <UserCard name=\"Bob\" email=\"bob@email.com\" />\n    </div>\n  );\n}\n\nrender(<App />);"
                  },
                  {
                        "label": "Default props — fallback values",
                        "code": "function Greeting({ greeting = \"Hello\" }) {\n  return <p>{greeting}!</p>;\n}\n\nrender(<Greeting />);"
                  },
                  {
                        "label": "Props can be objects, arrays, and functions",
                        "code": "function DataCard({ user, tags, onDelete }) {\n  return (\n    <div>\n      <h3>{user.name}</h3>\n      <p>Tags: {tags.join(\", \")}</p>\n      <button onClick={onDelete}>Delete</button>\n    </div>\n  );\n}\n\nrender(\n  <DataCard\n    user={{ name: \"Alice\" }}\n    tags={[\"admin\", \"editor\"]}\n    onDelete={() => alert(\"Deleted!\")}\n  />\n);"
                  }
            ]
      },
      {
            "id": 5,
            "title": "useState — Scoreboard 🏆",
            "difficulty": "Beginner",
            "analogy": "A scoreboard that updates instantly. useState is your component's scoreboard — when it changes, the component re-renders.",
            "snippets": [
                  {
                        "label": "useState — a number counter",
                        "code": "function Counter() {\n  const [count, setCount] = useState(0);\n  return (\n    <div>\n      <p>Score: {count}</p>\n      <button onClick={() => setCount(count + 1)}>+1</button>\n      <button onClick={() => setCount(count - 1)}>-1</button>\n      <button onClick={() => setCount(0)}>Reset</button>\n    </div>\n  );\n}\n\nrender(<Counter />);"
                  },
                  {
                        "label": "useState — a string (controlled input)",
                        "code": "function TextInput() {\n  const [text, setText] = useState(\"\");\n  return (\n    <div>\n      <input value={text} onChange={(e) => setText(e.target.value)} />\n      <p>You typed: {text}</p>\n    </div>\n  );\n}\n\nrender(<TextInput />);"
                  },
                  {
                        "label": "useState — a boolean toggle",
                        "code": "function Toggle() {\n  const [isVisible, setIsVisible] = useState(true);\n  return (\n    <div>\n      {isVisible && <p>You can see me!</p>}\n      <button onClick={() => setIsVisible(!isVisible)}>Toggle</button>\n    </div>\n  );\n}\n\nrender(<Toggle />);"
                  },
                  {
                        "label": "useState — an object",
                        "code": "function Form() {\n  const [form, setForm] = useState({ name: \"\", email: \"\" });\n\n  const handleChange = (e) => {\n    setForm({ ...form, [e.target.name]: e.target.value });\n  };\n\n  return (\n    <div>\n      <input name=\"name\" value={form.name} onChange={handleChange} placeholder=\"Name\" />\n      <input name=\"email\" value={form.email} onChange={handleChange} placeholder=\"Email\" />\n      <p>{form.name} / {form.email}</p>\n    </div>\n  );\n}\n\nrender(<Form />);"
                  }
            ]
      },
      {
            "id": 6,
            "title": "useEffect — Side Effects 🌊",
            "difficulty": "Intermediate",
            "analogy": "After building a LEGO castle (render), you add lights (side effect). useEffect runs after render.",
            "snippets": [
                  {
                        "label": "useEffect with [] — runs once on mount",
                        "code": "function Welcome() {\n  const [message, setMessage] = useState(\"Loading...\");\n\n  useEffect(() => {\n    setMessage(\"Mounted!\");\n  }, []);\n\n  return <p>{message}</p>;\n}\n\nrender(<Welcome />);"
                  },
                  {
                        "label": "useEffect with a dependency — runs when it changes",
                        "code": "function Doubler() {\n  const [count, setCount] = useState(1);\n  const [doubled, setDoubled] = useState(0);\n\n  useEffect(() => {\n    setDoubled(count * 2);\n  }, [count]);\n\n  return (\n    <div>\n      <p>Count: {count}, Doubled: {doubled}</p>\n      <button onClick={() => setCount(count + 1)}>+1</button>\n    </div>\n  );\n}\n\nrender(<Doubler />);"
                  },
                  {
                        "label": "A live timer with cleanup",
                        "code": "function Timer() {\n  const [seconds, setSeconds] = useState(0);\n\n  useEffect(() => {\n    const interval = setInterval(() => {\n      setSeconds(s => s + 1);\n    }, 1000);\n\n    return () => clearInterval(interval);\n  }, []);\n\n  return <p>Time: {seconds}s</p>;\n}\n\nrender(<Timer />);"
                  },
                  {
                        "label": "Fetching data on mount",
                        "code": "function UserList() {\n  const [users, setUsers] = useState([]);\n  const [loading, setLoading] = useState(true);\n\n  useEffect(() => {\n    fetch(\"https://jsonplaceholder.typicode.com/users\")\n      .then(r => r.json())\n      .then(data => {\n        setUsers(data);\n        setLoading(false);\n      });\n  }, []);\n\n  if (loading) return <p>Loading...</p>;\n  return <ul>{users.map(u => <li key={u.id}>{u.name}</li>)}</ul>;\n}\n\nrender(<UserList />);"
                  }
            ]
      },
      {
            "id": 7,
            "title": "Lists & Keys — Name Tags 🏷️",
            "difficulty": "Beginner",
            "analogy": "Every student gets a name tag. React needs a unique name tag (key) for each list item.",
            "snippets": [
                  {
                        "label": "map + key — rendering a list",
                        "code": "function TodoList() {\n  const todos = [\n    { id: 1, text: \"Buy milk\" },\n    { id: 2, text: \"Do homework\" },\n    { id: 3, text: \"Sleep\" },\n  ];\n\n  return (\n    <ul>\n      {todos.map(todo => (\n        <li key={todo.id}>{todo.text}</li>\n      ))}\n    </ul>\n  );\n}\n\nrender(<TodoList />);"
                  },
                  {
                        "label": "Rendering a list of cards",
                        "code": "function UserCards() {\n  const users = [\n    { id: 1, name: \"Alice\", email: \"alice@email.com\" },\n    { id: 2, name: \"Bob\", email: \"bob@email.com\" },\n  ];\n\n  return (\n    <div>\n      {users.map(user => (\n        <div key={user.id} className=\"card\">\n          <h3>{user.name}</h3>\n          <p>{user.email}</p>\n        </div>\n      ))}\n    </div>\n  );\n}\n\nrender(<UserCards />);"
                  },
                  {
                        "label": "Why not to use the array index as a key",
                        "code": "function BadExample() {\n  const items = [\"Apple\", \"Banana\", \"Cherry\"];\n  return (\n    <ul>\n      {items.map((item, index) => (\n        <li key={index}>{item}</li>\n      ))}\n    </ul>\n  );\n}\n\n// Works here, but breaks when items are reordered/inserted —\n// prefer a stable id from your data instead of the index.\nrender(<BadExample />);"
                  },
                  {
                        "label": "Handling an empty list",
                        "code": "function ProductList() {\n  const products = [];\n\n  if (products.length === 0) {\n    return <p>No products found</p>;\n  }\n\n  return <div>{products.map(p => <div key={p.id}>{p.name}</div>)}</div>;\n}\n\nrender(<ProductList />);"
                  }
            ]
      },
      {
            "id": 8,
            "title": "Conditional Rendering — Right Content 📺",
            "difficulty": "Beginner",
            "analogy": "A TV shows different channels. If logged in, show the dashboard. Else, show the login page.",
            "snippets": [
                  {
                        "label": "Early return based on conditions",
                        "code": "function Dashboard({ isLoggedIn, user }) {\n  if (!isLoggedIn) return <p>Please log in</p>;\n  if (!user) return <p>Loading...</p>;\n  return <h1>Welcome, {user.name}!</h1>;\n}\n\nrender(<Dashboard isLoggedIn={true} user={{ name: \"Alice\" }} />);"
                  },
                  {
                        "label": "Ternary operator for two outcomes",
                        "code": "function StatusButton({ isActive }) {\n  return (\n    <button className={isActive ? \"btn-active\" : \"btn-inactive\"}>\n      {isActive ? \"Active\" : \"Inactive\"}\n    </button>\n  );\n}\n\nrender(<StatusButton isActive={true} />);"
                  },
                  {
                        "label": "Logical && — render only when true",
                        "code": "function Notification({ hasMessages }) {\n  return (\n    <div>\n      {hasMessages && <div>You have new messages!</div>}\n    </div>\n  );\n}\n\nrender(<Notification hasMessages={true} />);"
                  },
                  {
                        "label": "Logical || — a fallback value",
                        "code": "function UserGreeting({ name }) {\n  return <p>Hello, {name || \"Guest\"}</p>;\n}\n\nrender(<UserGreeting name=\"\" />);"
                  },
                  {
                        "label": "Object mapping instead of many if/else",
                        "code": "function StatusBadge({ status }) {\n  const statusMessages = {\n    pending: \"⏳ Pending...\",\n    success: \"✅ Success!\",\n    error: \"❌ Error\",\n  };\n\n  return <span>{statusMessages[status] || \"Unknown\"}</span>;\n}\n\nrender(<StatusBadge status=\"success\" />);"
                  }
            ]
      },
      {
            "id": 9,
            "title": "Forms — Filling Paperwork 📋",
            "difficulty": "Intermediate",
            "analogy": "A school form: fill in boxes, click submit, the school gets the info. React forms use 'controlled components'.",
            "snippets": [
                  {
                        "label": "A controlled text input",

    const STORAGE_KEY = "react-done";

    function initSidebar() {
      const list = document.getElementById("lesson-list");
      LESSONS.forEach(lesson => {
        const item = document.createElement("div");
        item.id = `sidebar-lesson-${lesson.id}`;
        item.className = "sidebar-item";
        item.onclick = () => {
          document.getElementById(`lesson-${lesson.id}`).scrollIntoView({ behavior: "smooth" });
        };
        item.textContent = `${lesson.id}. ${lesson.title.split(" ")[0]}`;
        list.appendChild(item);
      });
    }

    function initLessons() {
      const container = document.getElementById("lessons-container");
      LESSONS.forEach(lesson => {
        const section = document.createElement("section");
        section.id = `lesson-${lesson.id}`;
        section.className = "lesson";
        section.innerHTML = `
          <div style="display: flex; align-items: center; margin-bottom: 16px;">
            <span style="background: #06b6d4; color: white; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px;">L${lesson.id}</span>
            <h2 style="font-size: 1.75rem; font-weight: 900; margin: 0 0 0 16px; color: #0f172a;">${lesson.title}</h2>
            <span class="difficulty ${lesson.difficulty.toLowerCase()}">${lesson.difficulty}</span>
          </div>

          <div class="analogy">
            <strong style="color: #0e7490;">📚 Analogy:</strong> ${lesson.analogy}
          </div>

          <div class="key-points">
            <strong style="color: #166534;">✓ Key Points — each one is its own example below:</strong>
            <ul style="margin: 8px 0 0 0; padding-left: 20px;">
              ${lesson.snippets.map(s => `<li>${s.label}</li>`).join("")}
            </ul>
          </div>

          ${lesson.snippets.map((snippet, i) => {
            const canRun = !lesson.noRun && snippet.runnable !== false;
            return `
            <div class="code-block">
              <div class="snippet-label">${escapeHtml(snippet.label)}</div>
              ${canRun ? `<button class="run-btn" onclick="runReactSnippet(${lesson.id}, ${i})">▶ Run</button>` : ""}
              <button class="copy-btn" onclick="copyCode(this)">Copy</button>
              <pre><code class="language-javascript">${escapeHtml(snippet.code)}</code></pre>
              ${canRun ? `
                <div class="preview-panel" id="preview-${lesson.id}-${i}"></div>
                <pre class="preview-error" id="preview-error-${lesson.id}-${i}"></pre>
              ` : ""}
            </div>
          `;
          }).join("")}

          <button class="mark-btn" onclick="toggleLesson(${lesson.id})">Mark Complete ✓</button>
        `;
        container.appendChild(section);
      });
      hljs.highlightAll();
    }

    function escapeHtml(text) {
      const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
      return text.replace(/[&<>"']/g, c => map[c]);
    }

    function runReactSnippet(lessonId, index) {
      const lesson = LESSONS.find(l => l.id === lessonId);
      const snippet = lesson.snippets[index];
      const previewEl = document.getElementById(`preview-${lessonId}-${index}`);
      const errorEl = document.getElementById(`preview-error-${lessonId}-${index}`);

      previewEl.style.display = "block";
      errorEl.style.display = "none";
      errorEl.textContent = "";

      try {
        const cleaned = snippet.code
          .split("\n")
          .filter(line => !/^\s*import .* from ['"]/.test(line))
          .filter(line => !/^\s*export default /.test(line))
          .join("\n");

        const transformed = Babel.transform(cleaned, { presets: [["react", { runtime: "classic" }]] }).code;

        if (!previewEl._reactRoot) {
          previewEl._reactRoot = ReactDOM.createRoot(previewEl);
        }

        const scope = {
          React,
          useState: React.useState,
          useEffect: React.useEffect,
          useRef: React.useRef,
          useContext: React.useContext,
          useMemo: React.useMemo,
          useCallback: React.useCallback,
          useTransition: React.useTransition,
          createContext: React.createContext,
          memo: React.memo,
          lazy: React.lazy,
          Suspense: React.Suspense,
          render: (element) => previewEl._reactRoot.render(element),
        };

        const argNames = Object.keys(scope);
        const argValues = Object.values(scope);
        const run = new Function(...argNames, transformed);
        run(...argValues);
      } catch (error) {
        errorEl.style.display = "block";
        errorEl.textContent = "✗ " + error.message;
      }
    }

    function toggleLesson(id) {
      let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      if (done.includes(id)) {
        done = done.filter(x => x !== id);
      } else {
        done.push(id);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
      updateProgress();
    }

    function updateProgress() {
      const done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      const pct = Math.round((done.length / LESSONS.length) * 100);
      document.getElementById("progress-bar").style.width = pct + "%";
      document.getElementById("progress-text").textContent = `${done.length} / ${LESSONS.length} lessons complete`;
      document.getElementById("progress-counter").textContent = done.length;

      LESSONS.forEach(lesson => {
        const btn = document.querySelector(`#lesson-${lesson.id} .mark-btn`);
        const sidebar = document.getElementById(`sidebar-lesson-${lesson.id}`);
        if (done.includes(lesson.id)) {
          btn.textContent = "✅ Completed!";
          btn.classList.add("completed");
          sidebar.classList.add("completed");
        } else {
          btn.textContent = "Mark Complete ✓";
          btn.classList.remove("completed");
          sidebar.classList.remove("completed");
        }
      });

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".sidebar-item").forEach(item => item.classList.remove("active"));
            const lessonNum = entry.target.id.split("-")[1];
            document.getElementById(`sidebar-lesson-${lessonNum}`)?.classList.add("active");
          }
        });
      }, { threshold: 0.3 });

      document.querySelectorAll(".lesson").forEach(el => observer.observe(el));
    }

    function copyCode(btn) {
      const code = btn.parentElement.querySelector("code").textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = "Copied! ✓";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    function resetProgress() {
      if (confirm("Reset all progress?")) {
        localStorage.removeItem(STORAGE_KEY);
        updateProgress();
      }
    }

    initSidebar();
    initLessons();
    updateProgress();
  </script>
