    <div style="background: linear-gradient(135deg, #22c55e 0%, #86efac 100%); padding: 40px; text-align: center; color: #1e293b;">
      <h1 style="font-size: 2.5rem; font-weight: 900; margin: 0;">Node.js</h1>
      <p style="margin: 8px 0 0 0; font-size: 1rem;">Run JavaScript on servers and build REST APIs with Express.js</p>

  <script>
    const LESSONS = [
      {
            "id": 1,
            "title": "What is Node.js? — JS Outside Browser 🌍",
            "difficulty": "Beginner",
            "analogy": "Normally JavaScript works on stage (the browser). Node.js lets the same performer work backstage (the server), doing admin tasks the audience never sees.",
            "snippets": [
                  {
                        "label": "Node.js runs JS outside the browser",
                        "code": "console.log(\"Hello from Node.js!\");\nconsole.log(\"Running outside the browser\");\n\n// Run with: node hello.js"
                  },
                  {
                        "label": "Built-in module example: os",
                        "code": "const os = require('os');\nconsole.log('OS:', os.platform());\nconsole.log('CPU:', os.cpus()[0].model);\nconsole.log('RAM (MB):', Math.round(os.totalmem() / 1024 / 1024));"
                  },
                  {
                        "label": "npm — the package manager",
                        "code": "// Check versions\nnode --version\nnpm --version\n\n// Install a package\nnpm install express"
                  },
                  {
                        "label": "package.json — project config",
                        "code": "{\n  \"name\": \"my-app\",\n  \"version\": \"1.0.0\",\n  \"main\": \"index.js\"\n}"
                  }
            ]
      },
      {
            "id": 2,
            "title": "Modules — Sharing Tools 🧰",
            "difficulty": "Beginner",
            "analogy": "Different toolboxes for different jobs. require() grabs tools from other boxes.",
            "snippets": [
                  {
                        "label": "module.exports — share code from a file",
                        "code": "// math.js\nfunction add(a, b) { return a + b; }\nfunction subtract(a, b) { return a - b; }\n\nmodule.exports = { add, subtract };"
                  },
                  {
                        "label": "require() — load a module",
                        "code": "// app.js\nconst math = require('./math');\nconsole.log(math.add(5, 3));\nconsole.log(math.subtract(10, 4));"
                  },
                  {
                        "label": "Built-in module example: path",
                        "code": "const path = require('path');\nconsole.log(path.join('/home', 'user', 'file.txt'));\nconsole.log(path.extname('image.png'));"
                  },
                  {
                        "label": "ES Modules alternative (import/export)",
                        "code": "// package.json needs \"type\": \"module\"\n\n// math.js\nexport const add = (a, b) => a + b;\n\n// app.js\nimport { add } from './math.js';\nconsole.log(add(2, 3));"
                  }
            ]
      },
      {
            "id": 3,
            "title": "File System — Reading & Writing 📓",
            "difficulty": "Beginner",
            "analogy": "Node.js can read and write files like a notebook. Sync blocks everything until it is done; async lets other code keep running.",
            "snippets": [
                  {
                        "label": "Sync read — readFileSync (blocks)",
                        "code": "const fs = require('fs');\nconst content = fs.readFileSync('notes.txt', 'utf-8');\nconsole.log(content);"
                  },
                  {
                        "label": "Async callback — readFile (older style)",
                        "code": "const fs = require('fs');\nfs.readFile('notes.txt', 'utf-8', (err, data) => {\n  if (err) { console.error(err); return; }\n  console.log(data);\n});"
                  },
                  {
                        "label": "Async/await with fs.promises (recommended)",
                        "code": "const fsPromises = require('fs').promises;\n\nasync function readNote() {\n  try {\n    const data = await fsPromises.readFile('notes.txt', 'utf-8');\n    console.log(data);\n  } catch (err) {\n    console.error('Error:', err.message);\n  }\n}\nreadNote();"
                  },
                  {
                        "label": "writeFile / appendFile / readdir",
                        "code": "const fsPromises = require('fs').promises;\n\nawait fsPromises.writeFile('notes.txt', 'New content', 'utf-8');\nawait fsPromises.appendFile('log.txt', `\\n[${new Date()}] Event`);\nconst files = await fsPromises.readdir('./');\nconsole.log(files);"
                  }
            ]
      },
      {
            "id": 4,
            "title": "HTTP Server — Post Office 📮",
            "difficulty": "Beginner",
            "analogy": "A post office receives letters (requests) and sends replies (responses). The http module is your post office.",
            "snippets": [
                  {
                        "label": "createServer + listen",
                        "code": "const http = require('http');\n\nconst server = http.createServer((request, response) => {\n  response.writeHead(200);\n  response.end('Hello!');\n});\n\nserver.listen(3000, () => {\n  console.log('Server running at http://localhost:3000');\n});"
                  },
                  {
                        "label": "Reading request.url and request.method",
                        "code": "const server = http.createServer((request, response) => {\n  console.log(`${request.method} ${request.url}`);\n  response.end('ok');\n});"
                  },
                  {
                        "label": "Routing with if/else on the url",
                        "code": "const server = http.createServer((request, response) => {\n  response.setHeader('Content-Type', 'application/json');\n  if (request.url === '/' && request.method === 'GET') {\n    response.writeHead(200);\n    response.end(JSON.stringify({ message: 'Welcome!' }));\n  } else {\n    response.writeHead(404);\n    response.end(JSON.stringify({ error: 'Not Found' }));\n  }\n});"
                  }
            ]
      },
      {
            "id": 5,
            "title": "Express.js — Smarter Post Office ⚡",
            "difficulty": "Beginner",
            "analogy": "Raw http is building from bricks. Express.js is a pre-built kit — same result, much faster.",
            "snippets": [
                  {
                        "label": "Setting up Express + JSON middleware",
                        "code": "const express = require('express');\nconst app = express();\napp.use(express.json());"
                  },
                  {
                        "label": "Basic GET route — res.json",
                        "code": "app.get('/', (req, res) => {\n  res.json({ message: 'Hello from Express!' });\n});"
                  },
                  {
                        "label": "req.params — URL parameters",
                        "code": "app.get('/hello/:name', (req, res) => {\n  const { name } = req.params;\n  res.json({ greeting: `Hello, ${name}!` });\n});"
                  },
                  {
                        "label": "req.body + res.status — handling POST data",
                        "code": "app.post('/data', (req, res) => {\n  console.log('Received:', req.body);\n  res.status(201).json({ received: req.body });\n});"
                  },
                  {
                        "label": "app.listen — start the server",
                        "code": "const PORT = process.env.PORT || 3000;\napp.listen(PORT, () => {\n  console.log(`Server at http://localhost:${PORT}`);\n});"
                  }
            ]
      },
      {
            "id": 6,
            "title": "Routing — Post Office Departments 🗂️",
            "difficulty": "Intermediate",
            "analogy": "A big post office has departments. Each handles specific mail. Express Router organizes routes by department.",
            "snippets": [
                  {
                        "label": "express.Router() — group related routes",
                        "code": "// routes/users.js\nconst express = require('express');\nconst router = express.Router();\n\nconst users = [\n  { id: 1, name: 'Alice', email: 'alice@email.com' },\n  { id: 2, name: 'Bob', email: 'bob@email.com' },\n];"
                  },
                  {
                        "label": "GET routes — list and get one",
                        "code": "router.get('/', (req, res) => {\n  res.json(users);\n});\n\nrouter.get('/:id', (req, res) => {\n  const user = users.find(u => u.id === parseInt(req.params.id));\n  if (!user) return res.status(404).json({ error: 'Not found' });\n  res.json(user);\n});"
                  },
                  {
                        "label": "POST route — create",
                        "code": "router.post('/', (req, res) => {\n  const newUser = { id: users.length + 1, ...req.body };\n  users.push(newUser);\n  res.status(201).json(newUser);\n});"
                  },
                  {
                        "label": "PUT route — update",
                        "code": "router.put('/:id', (req, res) => {\n  const index = users.findIndex(u => u.id === parseInt(req.params.id));\n  if (index === -1) return res.status(404).json({ error: 'Not found' });\n  users[index] = { ...users[index], ...req.body };\n  res.json(users[index]);\n});"
                  },
                  {
                        "label": "DELETE route — remove",
                        "code": "router.delete('/:id', (req, res) => {\n  const index = users.findIndex(u => u.id === parseInt(req.params.id));\n  if (index === -1) return res.status(404).json({ error: 'Not found' });\n  users.splice(index, 1);\n  res.status(204).send();\n});\n\nmodule.exports = router;"
                  },
                  {
                        "label": "Mounting the router in server.js",
                        "code": "const usersRouter = require('./routes/users');\napp.use('/users', usersRouter);"
                  }
            ]
      },
      {
            "id": 7,
            "title": "Middleware — Assembly Line Workers 🏭",
            "difficulty": "Intermediate",
            "analogy": "An assembly line where each worker does one job and can stop the line if something is wrong. Middleware processes requests the same way.",
            "snippets": [
                  {
                        "label": "A custom logging middleware",
                        "code": "function logger(req, res, next) {\n  console.log(`${new Date().toISOString()} ${req.method} ${req.url}`);\n  next();\n}\n\napp.use(logger);"
                  },
                  {
                        "label": "Middleware for one route (auth check)",
                        "code": "function authCheck(req, res, next) {\n  const token = req.headers.authorization;\n  if (!token) return res.status(401).json({ error: 'No token' });\n  req.userId = 'user123';\n  next();\n}\n\napp.get('/dashboard', authCheck, (req, res) => {\n  res.json({ message: `Hi user ${req.userId}` });\n});"
                  },
                  {
                        "label": "Popular third-party middleware",
                        "code": "const cors = require('cors');\nconst helmet = require('helmet');\nconst morgan = require('morgan');\n\napp.use(cors());\napp.use(helmet());\napp.use(morgan('dev'));"
                  },
                  {
                        "label": "Error-handling middleware (4 params, must be last)",
                        "code": "app.use((error, req, res, next) => {\n  console.error('Error:', error.message);\n  res.status(500).json({ error: error.message });\n});"
                  }
            ]
      },
      {
            "id": 8,
            "title": "REST API — Restaurant Menu 📋",
            "difficulty": "Intermediate",
            "analogy": "A restaurant menu defines what you can order. REST: GET reads the menu, POST places an order, PUT changes it, DELETE cancels it.",
            "snippets": [
                  {
                        "label": "GET — list and get one (with 404)",
                        "code": "app.get('/products', (req, res) => {\n  res.json({ data: products });\n});\n\napp.get('/products/:id', (req, res) => {\n  const product = products.find(p => p.id === parseInt(req.params.id));\n  if (!product) return res.status(404).json({ error: 'Not found' });\n  res.json(product);\n});"
                  },
                  {
                        "label": "POST — create with validation (400)",
                        "code": "app.post('/products', (req, res) => {\n  const { name, price } = req.body;\n  if (!name || !price) {\n    return res.status(400).json({ error: 'Name and price required' });\n  }\n  const product = { id: Date.now(), name, price };\n  products.push(product);\n  res.status(201).json(product);\n});"
                  },
                  {
                        "label": "PUT — update existing",
                        "code": "app.put('/products/:id', (req, res) => {\n  const product = products.find(p => p.id === parseInt(req.params.id));\n  if (!product) return res.status(404).json({ error: 'Not found' });\n  Object.assign(product, req.body);\n  res.json(product);\n});"
                  },
                  {
                        "label": "DELETE — remove (204 No Content)",
                        "code": "app.delete('/products/:id', (req, res) => {\n  const index = products.findIndex(p => p.id === parseInt(req.params.id));\n  if (index === -1) return res.status(404).json({ error: 'Not found' });\n  products.splice(index, 1);\n  res.status(204).send();\n});"
                  },
                  {
                        "label": "Query params — pagination",
                        "code": "app.get('/items', (req, res) => {\n  const page = req.query.page || 1;\n  const limit = req.query.limit || 10;\n  res.json({ page, limit });\n});"
                  }
            ]
      },
      {
            "id": 9,
            "title": "JWT Authentication — VIP Wristband 🎟️",
            "difficulty": "Advanced",
            "analogy": "Show ID once, get a wristband (JWT token). Show the wristband to access VIP areas — no need to show ID again.",
            "snippets": [
                  {
                        "label": "Register — hash the password",
                        "code": "const bcrypt = require('bcryptjs');\n\napp.post('/auth/register', async (req, res) => {\n  const { email, password } = req.body;\n  const hashedPassword = await bcrypt.hash(password, 10);\n  res.status(201).json({ message: 'Registered!' });\n});"
                  },
                  {
                        "label": "Login — verify password + sign a JWT",
                        "code": "const jwt = require('jsonwebtoken');\nconst JWT_SECRET = process.env.JWT_SECRET;\n\napp.post('/auth/login', async (req, res) => {\n  const { email, password } = req.body;\n  const user = { id: 1, email, password: '$2a$10$hashedvalue' };\n\n  const isMatch = await bcrypt.compare(password, user.password);\n  if (!isMatch) return res.status(401).json({ error: 'Wrong password' });\n\n  const token = jwt.sign({ userId: user.id, email }, JWT_SECRET, { expiresIn: '7d' });\n  res.json({ token });\n});"
                  },
                  {
                        "label": "Middleware that verifies the Bearer token",
                        "code": "function authenticate(req, res, next) {\n  const auth = req.headers.authorization;\n  if (!auth?.startsWith('Bearer ')) {\n    return res.status(401).json({ error: 'No token' });\n  }\n  try {\n    const token = auth.split(' ')[1];\n    req.user = jwt.verify(token, JWT_SECRET);\n    next();\n  } catch {\n    res.status(401).json({ error: 'Invalid token' });\n  }\n}"
                  },
                  {
                        "label": "A protected route using the middleware",
                        "code": "app.get('/profile', authenticate, (req, res) => {\n  res.json({ message: `Hello ${req.user.email}` });\n});"
                  }
            ]
      },
      {
            "id": 10,
            "title": "Environment Variables — Secret Diary 🔐",
            "difficulty": "Beginner",
            "analogy": "A secret diary only you can read. Write API keys, DB passwords, secrets there. Never commit it to git!",
            "snippets": [
                  {
                        "label": "Loading .env with dotenv",
                        "code": "require('dotenv').config();\n\nconst PORT = process.env.PORT || 3000;\nconst DB_URL = process.env.DATABASE_URL;\nconst NODE_ENV = process.env.NODE_ENV || 'development';\nconsole.log(`Running in ${NODE_ENV} mode`);"
                  },
                  {
                        "label": ".env file (never commit this)",
                        "code": "// .env\nPORT=5000\nDATABASE_URL=postgresql://user:pass@localhost:5432/mydb\nJWT_SECRET=super-secret-key\nNODE_ENV=development"
                  },
                  {
                        "label": ".env.example — a safe template to commit",
                        "code": "// .env.example\nPORT=\nDATABASE_URL=\nJWT_SECRET=\nNODE_ENV=development"
                  },
                  {
                        "label": ".gitignore — keep secrets out of git",
                        "code": "// .gitignore\nnode_modules/\n.env\n*.log"
                  }
            ]
      },
      {
            "id": 11,
            "title": "CORS — Visitor Passes 🪪",
            "difficulty": "Intermediate",
            "analogy": "Your API is a private building. CORS is the visitor policy — which websites are allowed to call your API?",
            "snippets": [
                  {
                        "label": "Allow everyone (development only)",
                        "code": "const cors = require('cors');\napp.use(cors());"
                  },
                  {
                        "label": "Allow specific origins (production-safe)",
                        "code": "app.use(cors({\n  origin: [\n    'https://myapp.vercel.app',\n    'https://myapp.railway.app',\n  ],\n  methods: ['GET', 'POST', 'PUT', 'DELETE'],\n  allowedHeaders: ['Content-Type', 'Authorization'],\n  credentials: true,\n}));"
                  },
                  {
                        "label": "CORS on a single route",
                        "code": "app.get('/public-data', cors(), (req, res) => {\n  res.json({ data: 'public' });\n});"
                  }
            ]
      },
      {
            "id": 12,
            "title": "Error Handling — Safety Nets 🥅",
            "difficulty": "Advanced",
            "analogy": "Tightrope walkers have nets below. try/catch is your safety net — catch errors before they crash the app.",
            "snippets": [
                  {
                        "label": "try/catch in a route, forwarded with next()",
                        "code": "app.get('/users/:id', async (req, res, next) => {\n  try {\n    const user = await User.findById(req.params.id);\n    if (!user) return res.status(404).json({ error: 'Not found' });\n    res.json(user);\n  } catch (error) {\n    next(error);\n  }\n});"
                  },
                  {
                        "label": "Global error handler (4 params, must be last)",
                        "code": "app.use((error, req, res, next) => {\n  console.error('Error:', error.message);\n  res.status(500).json({\n    error: process.env.NODE_ENV === 'production' ? 'Something went wrong' : error.message,\n  });\n});"
                  },
                  {
                        "label": "Custom error class",
                        "code": "class AppError extends Error {\n  constructor(message, statusCode) {\n    super(message);\n    this.statusCode = statusCode;\n  }\n}\n\nthrow new AppError('User not found', 404);"
                  },
                  {
                        "label": "Catching unhandled promise rejections",
                        "code": "process.on('unhandledRejection', (reason) => {\n  console.error('Unhandled Rejection:', reason);\n  process.exit(1);\n});"
                  }
            ]
      },
      {
            "id": 13,
            "title": "Deploy on Railway — Opening Restaurant 🚀",
            "difficulty": "Intermediate",
            "analogy": "You built the kitchen at home. Now rent commercial space (Railway), move in, plug in, and open the doors to the world!",

                  },
                  {
                        "label": "Set environment variables in the dashboard",
                        "code": "// Railway -> Variables tab\nDATABASE_URL=postgresql://...\nJWT_SECRET=prod-secret-key\nNODE_ENV=production"
                  },
                  {
                        "label": "Use Railway's PORT at runtime",
                        "code": "const PORT = process.env.PORT || 3000;\napp.listen(PORT, () => {\n  console.log(`Server at port ${PORT}`);\n});"

    const STORAGE_KEY = "node-done";

    function initSidebar() {
      const list = document.getElementById("lesson-list");
      LESSONS.forEach(lesson => {
        const item = document.createElement("div");
        item.id = `sidebar-lesson-${lesson.id}`;
        item.className = "sidebar-item";
        item.onclick = () => {
          document.getElementById(`lesson-${lesson.id}`).scrollIntoView({ behavior: "smooth" });
        };
        item.textContent = `${lesson.id}. ${lesson.title.split(" ")[0]}`;
        list.appendChild(item);
      });
    }

    function initLessons() {
      const container = document.getElementById("lessons-container");
      LESSONS.forEach(lesson => {
        const section = document.createElement("section");
        section.id = `lesson-${lesson.id}`;
        section.className = "lesson";
        section.innerHTML = `
          <div style="display: flex; align-items: center; margin-bottom: 16px;">
            <span style="background: #22c55e; color: white; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-center; font-weight: bold; font-size: 14px;">L${lesson.id}</span>
            <h2 style="font-size: 1.75rem; font-weight: 900; margin: 0 0 0 16px; color: #0f172a;">${lesson.title}</h2>
            <span class="difficulty ${lesson.difficulty.toLowerCase()}">${lesson.difficulty}</span>
          </div>

          <div class="analogy">
            <strong style="color: #166534;">📚 Analogy:</strong> ${lesson.analogy}
          </div>

          <div class="key-points">
            <strong style="color: #166534;">✓ Key Points — each one is its own example below:</strong>
            <ul style="margin: 8px 0 0 0; padding-left: 20px;">
              ${lesson.snippets.map(s => `<li>${s.label}</li>`).join("")}
            </ul>
          </div>

          ${lesson.snippets.map(snippet => `
            <div class="code-block">
              <div class="snippet-label">${escapeHtml(snippet.label)}</div>
              <button class="copy-btn" onclick="copyCode(this)">Copy</button>
              <pre><code class="language-javascript">${escapeHtml(snippet.code)}</code></pre>
            </div>
          `).join("")}

          <button class="mark-btn" onclick="toggleLesson(${lesson.id})">Mark Complete ✓</button>
        `;
        container.appendChild(section);
      });
      hljs.highlightAll();
    }

    function escapeHtml(text) {
      const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
      return text.replace(/[&<>"']/g, c => map[c]);
    }

    function toggleLesson(id) {
      let done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      if (done.includes(id)) {
        done = done.filter(x => x !== id);
      } else {
        done.push(id);
      }
      localStorage.setItem(STORAGE_KEY, JSON.stringify(done));
      updateProgress();
    }

    function updateProgress() {
      const done = JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      const pct = Math.round((done.length / LESSONS.length) * 100);
      document.getElementById("progress-bar").style.width = pct + "%";
      document.getElementById("progress-text").textContent = `${done.length} / ${LESSONS.length} lessons complete`;
      document.getElementById("progress-counter").textContent = done.length;

      LESSONS.forEach(lesson => {
        const btn = document.querySelector(`#lesson-${lesson.id} .mark-btn`);
        const sidebar = document.getElementById(`sidebar-lesson-${lesson.id}`);
        if (done.includes(lesson.id)) {
          btn.textContent = "✅ Completed!";
          btn.classList.add("completed");
          sidebar.classList.add("completed");
        } else {
          btn.textContent = "Mark Complete ✓";
          btn.classList.remove("completed");
          sidebar.classList.remove("completed");
        }
      });

      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            document.querySelectorAll(".sidebar-item").forEach(item => item.classList.remove("active"));
            const lessonNum = entry.target.id.split("-")[1];
            document.getElementById(`sidebar-lesson-${lessonNum}`)?.classList.add("active");
          }
        });
      }, { threshold: 0.3 });

      document.querySelectorAll(".lesson").forEach(el => observer.observe(el));
    }

    function copyCode(btn) {
      const code = btn.parentElement.querySelector("code").textContent;
      navigator.clipboard.writeText(code).then(() => {
        btn.textContent = "Copied! ✓";
        btn.classList.add("copied");
        setTimeout(() => {
          btn.textContent = "Copy";
          btn.classList.remove("copied");
        }, 2000);
      });
    }

    function resetProgress() {
      if (confirm("Reset all progress?")) {
        localStorage.removeItem(STORAGE_KEY);
        updateProgress();
      }
    }

    initSidebar();
    initLessons();
    updateProgress();
  </script>
